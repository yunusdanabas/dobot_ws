name: Smoke

on:
  push:
  pull_request:

jobs:
  smoke-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch vendor SDKs
        shell: bash
        run: |
          git clone --depth 1 https://github.com/AlexGustafsson/dobot-python.git vendor/dobot-python
          git clone --depth 1 https://github.com/Dobot-Arm/TCP-IP-4Axis-Python.git vendor/TCP-IP-4Axis-Python

      - name: Compile sources
        shell: bash
        run: |
          python -m compileall magician mg400 Students tests terminal_keys.py windows

      - name: Run portability tests
        shell: bash
        run: |
          python -m unittest discover -s tests -v

      - name: Run root help smoke checks
        shell: bash
        run: |
          python magician/07_keyboard_teleop.py --help
          python mg400/07_keyboard_teleop.py --help
          python mg400/00_connectivity_check.py --help

      - name: Run student script smoke checks
        shell: bash
        run: |
          cd Students/01_SecondWeek/mg400 && python 01_init_check.py --help && cd ../../..
          cd Students/01_SecondWeek/mg400 && python 02_joint_control.py --help && cd ../../..
          cd Students/01_SecondWeek/mg400 && python 03_relative_joint_control.py --help && cd ../../..

  smoke-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch vendor SDKs
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/AlexGustafsson/dobot-python.git vendor/dobot-python
          git clone --depth 1 https://github.com/Dobot-Arm/TCP-IP-4Axis-Python.git vendor/TCP-IP-4Axis-Python

      - name: Compile sources
        shell: pwsh
        run: |
          python -m compileall magician mg400 Students tests terminal_keys.py windows

      - name: Run portability tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v

      - name: Run root help smoke checks
        shell: pwsh
        run: |
          python magician/07_keyboard_teleop.py --help
          python mg400/07_keyboard_teleop.py --help
          python mg400/00_connectivity_check.py --help

      - name: Run student script smoke checks
        shell: pwsh
        run: |
          Push-Location Students\01_SecondWeek\mg400
          python 01_init_check.py --help
          python 02_joint_control.py --help
          python 03_relative_joint_control.py --help
          Pop-Location
